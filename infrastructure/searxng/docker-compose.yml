services:
  valkey:
    image: valkey/valkey:8.1.8-alpine3.23
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  searxng:
    image: ghcr.io/searxng/searxng:2026.5.10-df1f24fb7
    depends_on:
      valkey:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./searxng:/etc/searxng:ro
      - searxng-cache:/var/cache/searxng
    environment:
      SEARXNG_BASE_URL: http://localhost:8080/
      SEARXNG_SECRET: ${SEARXNG_SECRET:?Set_SEARXNG_SECRET_to_a_random_value}
      SEARXNG_VALKEY_URL: valkey://valkey:6379/0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal

networks:
  internal:
    internal: true

volumes:
  searxng-cache:
