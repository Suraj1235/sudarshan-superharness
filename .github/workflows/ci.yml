name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.9"
          - os: ubuntu-latest
            python: "3.13"
          - os: windows-latest
            python: "3.13"
          - os: macos-latest
            python: "3.13"

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install test environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[test]"

      - name: Run test suite
        run: python -m pytest tests -q

      - name: Verify source installation
        run: python verify_installation.py --workspace .

      - name: Smoke-test wheel outside the checkout
        if: runner.os == 'Linux' && matrix.python == '3.13'
        shell: bash
        run: |
          python -m pip wheel . --no-deps --wheel-dir "$RUNNER_TEMP/wheels"
          python -m venv "$RUNNER_TEMP/sudarshan-smoke"
          "$RUNNER_TEMP/sudarshan-smoke/bin/python" -m pip install \
            --no-index --find-links "$RUNNER_TEMP/wheels" sudarshan-superharness
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/sudarshan-smoke/bin/sudarshan" --version
          "$RUNNER_TEMP/sudarshan-smoke/bin/sudarshan" doctor --json
          bridge_json="[\"$RUNNER_TEMP/sudarshan-smoke/bin/python\",\"$GITHUB_WORKSPACE/examples/demo_command_bridge.py\"]"
          "$RUNNER_TEMP/sudarshan-smoke/bin/sudarshan" build \
            --idea "Build a tested calculator library" \
            --workspace "$RUNNER_TEMP/generated-project" \
            --provider command \
            --provider-command-json "$bridge_json" \
            --model wheel-smoke \
            --allow-host-commands \
            --yes \
            --json
          test -f "$RUNNER_TEMP/generated-project/COMPLETION_REPORT.md"
