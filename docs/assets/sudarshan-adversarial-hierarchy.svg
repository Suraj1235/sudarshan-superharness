<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="780" viewBox="0 0 1600 780" role="img" aria-labelledby="title desc">
  <title id="title">Sudarshan V16.9 adversarial hierarchy</title>
  <desc id="desc">The historical host profile separates orchestration, observation, product governance, isolated workers, adversarial review, escalation, and human intervention.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#405653"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#c43d31"/>
    </marker>
    <filter id="shadow" x="-10%" y="-15%" width="120%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#18312e" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1600" height="780" fill="#f7f8f6"/>
  <rect x="36" y="32" width="1528" height="716" rx="8" fill="#ffffff" stroke="#dce3e0"/>
  <text x="86" y="91" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#c43d31">V16.9 HISTORICAL HOST PROFILE</text>
  <text x="86" y="132" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#14201f">An engineering firm, expressed as adversarial roles and state</text>
  <text x="86" y="167" font-family="Arial, sans-serif" font-size="17" fill="#596765">Implemented protocol utilities; autonomous role spawning remains host-dependent and experimental.</text>

  <g filter="url(#shadow)">
    <rect x="605" y="214" width="390" height="94" rx="6" fill="#143b38"/>
  </g>
  <text x="800" y="251" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Chief Orchestrator</text>
  <text x="800" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#cbe0dd">research-commander / dag-architect</text>
  <text x="800" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9fc3be">decompose, contract, schedule, route</text>

  <g filter="url(#shadow)">
    <rect x="86" y="220" width="292" height="148" rx="6" fill="#eff8fb" stroke="#55a8bb"/>
  </g>
  <text x="118" y="255" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0e5d70">Observer Node (L0.5)</text>
  <text x="118" y="281" font-family="Arial, sans-serif" font-size="14" fill="#356672">global-cartographer</text>
  <text x="118" y="316" font-family="Arial, sans-serif" font-size="14" fill="#425c59">Maintains global semantic memory</text>
  <text x="118" y="340" font-family="Arial, sans-serif" font-size="14" fill="#425c59">and intercepts brittle escalations.</text>

  <path d="M605 260 C500 260 462 288 378 288" fill="none" stroke="#55a8bb" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="462" y="376" width="300" height="112" rx="6" fill="#fffaf0" stroke="#d5a24c"/>
    <rect x="838" y="376" width="300" height="112" rx="6" fill="#f6f0f8" stroke="#a67ab2"/>
  </g>
  <text x="612" y="411" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#5d4318">PM Node</text>
  <text x="612" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#6d5c3e">scope-validator / architecture-auditor</text>
  <text x="612" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6d5c3e">scope, pre-mortem, contracts, AA1-AA5</text>
  <text x="988" y="411" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#70427b">Creative Director</text>
  <text x="988" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#76567d">ui-scout</text>
  <text x="988" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#76567d">five-round Delta-Debate and UI_SPEC</text>
  <line x1="720" y1="308" x2="624" y2="376" stroke="#405653" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="880" y1="308" x2="976" y2="376" stroke="#405653" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="762" y1="432" x2="838" y2="432" stroke="#a67ab2" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#arrow)"/>
  <text x="800" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#76567d">DEBATE</text>

  <g filter="url(#shadow)">
    <rect x="366" y="554" width="868" height="112" rx="6" fill="#f0f3f2" stroke="#aabbb7"/>
  </g>
  <text x="800" y="586" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#314744">Isolated Grunts: narrow subgraphs, no injected skills</text>
  <rect x="398" y="608" width="180" height="34" rx="5" fill="#ffffff" stroke="#aabbb7"/>
  <rect x="594" y="608" width="180" height="34" rx="5" fill="#ffffff" stroke="#aabbb7"/>
  <rect x="790" y="608" width="180" height="34" rx="5" fill="#ffffff" stroke="#aabbb7"/>
  <rect x="986" y="608" width="216" height="34" rx="5" fill="#ffffff" stroke="#aabbb7"/>
  <text x="488" y="630" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#425c59">frontend slice</text>
  <text x="684" y="630" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#425c59">backend slice</text>
  <text x="880" y="630" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#425c59">data slice</text>
  <text x="1094" y="630" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#425c59">integration slice</text>
  <line x1="612" y1="488" x2="612" y2="554" stroke="#405653" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="988" y1="488" x2="988" y2="554" stroke="#405653" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="1270" y="244" width="244" height="104" rx="6" fill="#fff0ee" stroke="#d9776d"/>
    <rect x="1270" y="386" width="244" height="104" rx="6" fill="#fff0ee" stroke="#d9776d"/>
    <rect x="1270" y="554" width="244" height="112" rx="6" fill="#edf8f1" stroke="#5ba87b"/>
  </g>
  <text x="1392" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#9e332a">Judge Probe</text>
  <text x="1392" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7c4b47">single-turn research verdict</text>
  <text x="1392" y="329" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7c4b47">Gate 0</text>
  <text x="1392" y="421" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#9e332a">Red Team</text>
  <text x="1392" y="447" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7c4b47">attack, autopsy, green light</text>
  <text x="1392" y="471" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7c4b47">never self-certify</text>
  <text x="1392" y="589" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#145a3a">Staff Engineer</text>
  <text x="1392" y="615" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#38664d">senior escalation reserve</text>
  <text x="1392" y="639" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#38664d">reads AUTOPSY, repairs, re-enters gate</text>
  <path d="M995 258 C1124 258 1172 284 1270 292" fill="none" stroke="#c43d31" stroke-width="3" marker-end="url(#arrow-red)"/>
  <path d="M1234 608 C1276 600 1284 490 1270 448" fill="none" stroke="#c43d31" stroke-width="3" marker-end="url(#arrow-red)"/>
  <line x1="1392" y1="490" x2="1392" y2="554" stroke="#c43d31" stroke-width="3" marker-end="url(#arrow-red)"/>
  <path d="M1270 610 C1196 705 514 708 424 650" fill="none" stroke="#168a55" stroke-width="3" stroke-dasharray="9 7" marker-end="url(#arrow)"/>
  <rect x="86" y="416" width="292" height="102" rx="6" fill="#f0f3f2" stroke="#aabbb7"/>
  <text x="118" y="451" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#314744">L1 Human</text>
  <text x="118" y="478" font-family="Arial, sans-serif" font-size="14" fill="#425c59">Only true world-state blockers:</text>
  <text x="118" y="501" font-family="Arial, sans-serif" font-size="14" fill="#425c59">keys, approvals, CAPTCHAs, decisions.</text>
  <path d="M378 338 C416 374 410 434 378 458" fill="none" stroke="#405653" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#arrow)"/>

  <text x="86" y="738" font-family="Arial, sans-serif" font-size="13" fill="#74817f">Solid lines show planned authority flow. Dashed lines show observation, debate, or recovery. The standalone engine does not require this host profile.</text>
</svg>
